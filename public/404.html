<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reverso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Single Page Apps for GitHub Pages
      MIT License — https://github.com/rafgraph/spa-github-pages
      Rewrites /<any-path> into /?/<any-path> so the root index.html
      serves the SPA, which then decodes the path via a companion
      script in index.html and hands it to React Router.
    -->
    <script type="text/javascript">
      // pathSegmentsToKeep = 1 → keep the repo name (e.g. /SellerElysium500/).
      // Set to 0 for a project on a custom domain / user site.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
