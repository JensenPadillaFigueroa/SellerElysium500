<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06080c" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f6fb" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Reverso — flip the car-buying game. Buyers name the price, verified dealers come to them." />
    <title>Reverso — Reverse Auto Marketplace</title>

    <!--
      SPA routing fallback for GitHub Pages (see public/404.html).
      Decodes the ?/route-rewrite back into a clean path before React Router boots.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
